<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Token 使用监控</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 2.5rem; }
        .card { background: white; border-radius: 15px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: #f7fafc; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #2b6cb0; }
        .stat-label { color: #718096; margin-top: 5px; }
        .chart-container { position: relative; height: 300px; }
        .info { text-align: center; color: white; margin-top: 30px; opacity: 0.9; }
        .info a { color: white; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Token 使用监控</h1>
        
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #2d3748;">📊 今日统计</h2>
            <div class="stats-grid" id="today-stats">
                <div class="stat-box">
                    <div class="stat-value" id="jina-requests">-</div>
                    <div class="stat-label">Jina 请求次数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="jina-tokens">-</div>
                    <div class="stat-label">Jina Token 用量</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="deepseek-requests">-</div>
                    <div class="stat-label">DeepSeek 请求次数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="deepseek-tokens">-</div>
                    <div class="stat-label">DeepSeek Token 用量</div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2 style="margin-bottom: 20px; color: #2d3748;">📈 30 天趋势</h2>
            <div class="chart-container">
                <canvas id="tokenChart"></canvas>
            </div>
        </div>
        
        <p class="info">
            数据来自 <a href="token_usage.json" target="_blank">token_usage.json</a> · 
            <a href="index.html">返回首页</a>
        </p>
    </div>

    <script>
        async function loadTokenData() {
            try {
                // 添加时间戳避免缓存
                const response = await fetch('token_usage.json?t=' + new Date().getTime());
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    document.getElementById('today-stats').innerHTML = '<p style="text-align:center;color:#718096;">暂无数据</p>';
                    return;
                }
                
                // 显示今日统计（最后一条记录）
                const today = data[data.length - 1];
                document.getElementById('jina-requests').textContent = today.jina_requests || 0;
                document.getElementById('jina-tokens').textContent = (today.jina_tokens || 0).toLocaleString();
                document.getElementById('deepseek-requests').textContent = today.deepseek_requests || 0;
                document.getElementById('deepseek-tokens').textContent = (today.deepseek_total_tokens || 0).toLocaleString();
                
                // 绘制图表
                const dates = data.map(d => d.date.slice(5)); // 只显示 MM-DD
                const jinaTokens = data.map(d => d.jina_tokens || 0);
                const deepseekTokens = data.map(d => d.deepseek_total_tokens || 0);
                
                const ctx = document.getElementById('tokenChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: dates,
                        datasets: [
                            {
                                label: 'Jina AI Token',
                                data: jinaTokens,
                                borderColor: '#4299e1',
                                backgroundColor: 'rgba(66, 153, 225, 0.1)',
                                fill: true,
                                tension: 0.3
                            },
                            {
                                label: 'DeepSeek Token',
                                data: deepseekTokens,
                                borderColor: '#48bb78',
                                backgroundColor: 'rgba(72, 187, 120, 0.1)',
                                fill: true,
                                tension: 0.3
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top' },
                            tooltip: { mode: 'index', intersect: false }
                        },
                        scales: {
                            y: { beginAtZero: true, title: { display: true, text: 'Token 数量' } },
                            x: { title: { display: true, text: '日期' } }
                        }
                    }
                });
                
            } catch (error) {
                console.error('加载 Token 数据失败:', error);
                document.getElementById('today-stats').innerHTML = '<p style="text-align:center;color:#e53e3e;">加载数据失败，请稍后刷新</p>';
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadTokenData);
    </script>
</body>
</html>
