name: 🌍 能源新闻自动监控

on:
  schedule:
    - cron: '45 0 * * *'   # UTC 0:45 = 北京时间 8:45
  workflow_dispatch:

concurrency:
  group: energy-monitor
  cancel-in-progress: true

# ⭐ 关键：授予写入权限
permissions:
  contents: write        # 允许推送代码到仓库

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      # 步骤 1: 检出代码
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
      
      # 步骤 2: 设置 Python 环境
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 步骤 3: 安装依赖
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 步骤 4: 配置 Git 用户
      - name: ⚙️ Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      # 步骤 5: 运行监控脚本
      - name: 🚀 Run monitor
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JINA_KEY: ${{ secrets.JINA_KEY }}
        run: python src/monitor.py
      
      # ⭐ 步骤 6 (新增): 将报告移动到 docs 文件夹
      - name: 📂 Move reports to docs folder
        run: |
          # 确保 docs 文件夹存在
          mkdir -p docs
          
          # 移动 HTML 和 MD 报告到 docs (如果存在)
          mv *.html docs/ 2>/dev/null || true
          mv *.md docs/ 2>/dev/null || true

          # ✅ 新增：移动 token_usage.json（关键！）
          mv token_usage.json docs/ 2>/dev/null || true
          
          # 如果有 history.txt 也需要移动 (如果您的 index 依赖它，否则可忽略)
          # mv history.txt docs/ 2>/dev/null || true
          
          # 验证移动结果
          echo "Files in docs folder:"
          ls -la docs/
      
      # 步骤 7: 提交生成的报告 (修改路径为 docs/)
      - name: 📤 Commit and push reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 先拉取，避免冲突
          git pull origin main || true
          
          # ⭐ 新增：添加 token_usage.json
          git add docs/*.md docs/*.html docs/token_usage.json history.txt || true
          git commit -m "📊 Auto-generated report $(date -u +%Y-%m-%d)" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true



      # 步骤 8: 上传报告作为 Artifact
      - name: 📦 Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: energy-reports-${{ github.run_number }}
          path: |
            docs/*.md
            docs/*.html
            docs/token_usage.json   # 👈 添加这一行
            history.txt
          retention-days: 30