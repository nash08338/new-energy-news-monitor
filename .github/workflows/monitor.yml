name: newenergynews

on:
  workflow_dispatch:

concurrency:
  group: energy-monitor
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run monitor
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          JINA_KEY: ${{ secrets.JINA_KEY }}
        run: python src/monitor.py

      - name: Move reports to docs folder
        run: |
          mkdir -p docs
          mv *.html docs/ 2>/dev/null || true
          mv *.md docs/ 2>/dev/null || true
          mv token_usage.json docs/ 2>/dev/null || true
          echo "Files in docs folder:"
          ls -la docs/

      - name: Commit and push reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull origin main || true
          git add docs/*.md docs/*.html docs/token_usage.json history.txt || true
          git commit -m "📊 Auto-generated report $(date -u +%Y-%m-%d)" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: energy-reports-${{ github.run_number }}
          path: |
            docs/*.md
            docs/*.html
            docs/token_usage.json
            history.txt
          retention-days: 30
